; Vorlaxen ESP8266 firmware

[platformio]
default_envs = nodemcuv2

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs

build_flags =
  -D HOSTNAME_PREFIX=\"v\"
  -D SETUP_AP_SSID=\"VESPSetup\"
  -D FACTORY_RESET_PIN=D5
  -D MQTT_TOPIC_PREFIX=\"vorlaxen\"
  -D MQTT_DEFAULT_PORT=1883

lib_deps =
  marcoschwartz/LiquidCrystal_I2C@^1.1.4
  bblanchon/ArduinoJson@^7.4.2
  knolleary/PubSubClient@^2.8.0

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags =
  -I test/support/native
  -I include
  -std=c++17
  -D MQTT_DEFAULT_SCROLL_MS=300
  -D MQTT_MIN_SCROLL_MS=50
  -D HOSTNAME_PREFIX=\"v\"
  -D MQTT_TOPIC_PREFIX=\"vorlaxen\"
  -D MQTT_DEFAULT_PORT=1883
  -D MQTT_DEFAULT_BROKER=\"\"
lib_deps =
  bblanchon/ArduinoJson@^7.4.2
  throwtheswitch/Unity@^2.6.1
